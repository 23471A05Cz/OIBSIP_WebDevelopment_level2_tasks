<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Registration System</title>
<link rel="stylesheet" href="style6.css">
</head>
<body>
    <div class="container">
        <h2>Authentication System</h2>
        
        <!-- Registration Form -->
        <form id="registerForm" class="form" autocomplete="on" onsubmit="event.preventDefault(); register();">
            <h3>Register</h3>
            <input type="text" id="regName" name="regName" placeholder="Full Name" required autocomplete="name">
            <input type="email" id="regEmail" name="regEmail" placeholder="Email" required autocomplete="email">
            <input type="password" id="regPassword" name="regPassword" placeholder="Password" required autocomplete="new-password">
            <button type="submit">Register</button>
            <p id="regMessage" class="message"></p>
            <p>Already have an account? <span onclick="toggleForms()">Login here</span></p>
        </form>

        <!-- Login Form -->
        <form id="loginForm" class="form" autocomplete="on" style="display:none;" onsubmit="event.preventDefault(); login();">
            <h3>Login</h3>
            <input type="email" id="loginEmail" name="loginEmail" placeholder="Email" required autocomplete="email">
            <input type="password" id="loginPassword" name="loginPassword" placeholder="Password" required autocomplete="current-password">
            <button type="submit">Login</button>
            <p id="loginMessage" class="message"></p>
            <p>Don't have an account? <span onclick="toggleForms()">Register here</span></p>
        </form>

        <!-- Secured Page -->
        <div id="securedPage" class="form" style="display:none;">
            <h3>Secured Page</h3>
            <p id="welcomeText"></p>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

<script src="script1.js"></script>
</body>
</html>
